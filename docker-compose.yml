services:

  php:
    volumes:
      - app:/var/www
    build:
      context: .
      dockerfile: docker/php/dockerfile
    depends_on:
      - db
    environment:
      STORAGE_METHOD: ${STORAGE_METHOD}
      UNDER_MAINTENANCE: ${UNDER_MAINTENANCE}
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      PHP_DISPLAY_ERRORS: "0"
      PHP_ERROR_REPORTING: "E_ERROR | E_PARSE"
    networks:
      - ptd_network

  nginx:
    build: ./docker/nginx
    ports:
      - "80:80"
    volumes:
      - app:/var/www:ro
    depends_on:
      - php
    networks:
      - ptd_network

  db:
    image: "mariadb:11"
    restart: always
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - ptd_network


volumes:
  app:
  dbdata:

networks:
  ptd_network:
    driver: bridge
